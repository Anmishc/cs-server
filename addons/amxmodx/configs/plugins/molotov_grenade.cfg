// Molotov Grenade (molotov_grenade.amxx)

// Доступ по флагам для покупки/выдачи (как минимум один из указанных флагов)
// q = ADMIN_LEVEL_E, r = ADMIN_LEVEL_F
molotov_buy_access "qr"

// Сколько молотовых выдавать при спавне (0 = не выдавать)
// Если плагин поддерживает выдачу на спавне — будет выдавать.
molotov_equip_access "1"

// Проверять buyzone при покупке (1 = да, 0 = можно покупать где угодно)
molotov_check_buyzone "1"

// Цена
molotov_cost "800"

// Лимит покупок за раунд (-1 = без лимита)
molotov_buy_limit "1"

// С какого раунда доступен
molotov_limit_round "2"

// Урон при прямом попадании
molotov_check_hit_player "2"

// Приставка в киллфиде
molotov_killfeed "0"

// Радиус горения
molotov_radius "132.0"

// Время полёта до взрыва
molotov_throwtime "2.5"

// Длительность горения
molotov_duration "12"

// Кто получает урон (0 - враги, 1 - враги + бросивший, 2 - все)
molotov_demage_mode "1"

// Режим урона (1 - фикс, 2 - зависит от расстояния)
molotov_demage_radius_mode "2"

// Периодичность урона
molotov_demage_time "0.20"

// Урон за тик
molotov_demage_value "20.0"

// Кол-во визуальных волн
molotov_effect_num "4"

// Тушение дымом
molotov_smoke_touch "1"

// Модель дымовой
molotov_smoke_owner "models/w_smokegrenade.mdl"

// Тушение водой
molotov_water_touch "1"

// Удалять при касании sky
molotov_sky_force "1"