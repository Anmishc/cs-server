// С какого раунда работает плагин
// -
// Default: "0"
fpr_round "0"

// Минимальное количество игроков для работы плагина (не считая зрителей)
// -
// Default: "24"
fpr_min_players "4"

// Если одна команда доминирует над другой (побед подряд) то для этой команды плагин работать не будет
// -
// Default: "0"
fpr_domination "0"

// Сколько максимально игроков из команды TERRORIST сможет возродить плагин
// -
// Default: "2"
fpr_respawn_t "2"

// Сколько максимально игроков из команды CT сможет возродить плагин
// -
// Default: "2"
fpr_respawn_ct "2"

// Денежная компенсация при спавне игрока этим плагином
// -
// Default: "300"
fpr_money "300"

// Если это первый раунд то при спавне игрок получит 800$. (mp_startmoney)
// -
// Default: "1"
fpr_money_firstround "1"

// Если игрок совершил суицид, плагин в любом случае его проигнорирует
// -
// Default: "1"
fpr_prevent_suicide "1"

// Плагин не будет работать для тех кто уже был заспавнен как то еще в этом раунде.
// -
// Default: "1"
fpr_only_once "1"

// Плагин будет работать только первые Х сек. раунда
// -
// Default: "6"
fpr_time "20"

// Защита при спавне для возрожденного игрока
// -
// Default: "0"
fpr_protection "0"

// Флаг доступа к действиям плагина
// Используйте 0 чтобы работало для всех без исключения, или пустые ковычки
// -
// Default: ""
fpr_flag "qrst"

// Проигрывание звук в момент спавна
// Используйте 0 чтобы отключить или пустые ковычки
// -
// Default: ""
fpr_sound ""

// Показывать чат сообщение в момент спавна
// -
// Default: "1"
fpr_chat_message "1"