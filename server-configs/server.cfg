hostname "#1 FIRST UKRAINIAN PUBLIC"
sv_contact "telegram: @yurievichhhhhh"		//Ваш EMail адрес.
sv_instancebaselines "1"			//Включить инстанс базовых линий
sv_unlag "1"					//Лагокомпенсация.
sv_maxunlag "0.5"				//Максимальная лагокомпенсация, в секунду
sv_unlagsamples "1"				//unknown
sv_unlagpush "0"				//Отключение лагокомпенсации на уровне сервера.
sv_maxrate "100000"				//Максимальное колличество байт/сек, передаваемое сервером
sv_maxupdaterate "102"			//максимальное колличество обновлений
sv_minrate "20000"				//минимальное колличество байт/сек, передаваемое сервером
sv_minupdaterate "30"				//минимальное колличество обновлений
decalfrequency "60"				//Частота использования спрея.
sv_pure "0"					//unknown
sv_skies_mode "1"				//0 - небо будет заданное картой, 1 - небо будет меняться.
sv_aim "0"					//unknown
pausable "0"					//разрешить ставить паузу во время игры
sv_maxspeed "320"				//максимальная скорость игрока
mp_timelimit "0"				//ограничение по времени на карту, в минутах
sv_cheats "0"					//разрешить игровые читы на сервере
adjust_crosshair "4"				//unknown
mp_freezetime "2"				//начальный отсчёт времени в начале каждого раунда
mp_autoteambalance "1"			//разрешить автоматическую балансировку команд
gl_sprited "0"					//unknown
cl_minmodels "0"				//unknown
mp_consistency "1"				//unknown
mp_autocrosshair "0"				//разрешить автоприцеливание
mp_autokick "0"				//разрешить автокик за убийство игроков своей команды
mp_c4timer "35"				//время таймера бомбы
mp_flashlight "0"				//разрешить фонарик
mp_footsteps "1"				//звуки шагов
mp_friendlyfire "0"				//возможность атаковать своих
sv_alltalk "1"					//все слышат всех
mp_hostagepenalty "0"			//кикает террориста при убийстве заданного лимита заложников
mp_tkpunish "0"				//в следующем раунде убить того, кто убил игрока своей команды
mp_roundtime "3"				//длина раунда в минутах			
mp_buytime "0.15"				//время покупки в минутах
mp_fadetoblack "0"				//после смерти экран становится чёрным
mp_forcechasecam "2"			//камера после смерти(0-Все, 1-Свои, 2-Место смерти)
mp_forcecamera "1"				//камера в режиме спектатора(0-Все, 1-Свои, 2-Место смерти)
mp_kickpercent "100"				//выщитывает проценты в голосовании для удаления игрока
mp_playerid "1"				//контроль информации которую игрок видет на панели статуса
sv_timeout "40"				//через сколько отключить игрока если сервер не отвечает
sv_airaccelerate "10"				//определяет ускорение игрока, когда он находится в воздухе
sv_airmove "1"					// движение в воздухе
sv_proxies "1"					//Можно ли HLTV Proxy подключаться к вашему серверу
allow_spectators "1"				//разрешить спектаторы
mp_startmoney "800"				//колличество начальных денег у игроков
mp_chattime "5"				//время разговора перед сменой карты
sv_allowdownload "1"				//разрешить загрузку с сервера(например карт)
sv_allowupload "0"				//разрешить загрузку на сервер(например спреев)
sv_voiceenable "1"				//разрешить использование микрофона
sv_voicequality "5"				//качество передачи
sv_voicecodec "voice_speex"			//кодек 
sv_spectatormaxspeed "500"			//скорость полета спектатора
sys_ticrate "10000"				//частота обновления сервера
mp_limitteams "1"				//максимальное количество игроков за одну команду
sv_rcon_banpenalty "9000"			//время бана за не правельно введенный Rcon
sv_rcon_maxfailures "1"			//максимальное колличество попыток при наборе rcon-пароля
sv_rcon_minfailures "1"			//количество попыток в определенное время
sv_rcon_minfailuretime "9999"			//время на ввод Rcon	
log "on"					//вести лог сервера
sv_logbans "0"					//записывать в лог баны
sv_logecho "0"					//показывать информацию из логов сервера в консоль(сервера)
sv_logfile "0"					//записывать логи сервера в файл
sv_log_onefile "1"				//разбивать по файлам
mp_logdetail "0"				//детализация логов
sv_rehlds_movecmdrate_max_burst "2500"
sv_rehlds_stringcmdrate_max_burst "250"
sv_rehlds_movecmdrate_max_avg "800"
mp_timelimit 0
exec fastdl.cfg
